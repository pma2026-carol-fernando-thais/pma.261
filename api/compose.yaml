
name: store-api

services:

  db:
    image: postgres:17
    hostname: db
    # ports:
    #   - 5432:5432
    volumes:
      - ${VOLUME_DB}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-store}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
      POSTGRES_DB: ${DB_NAME:-store}

  account:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    hostname: account
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: ${DB_NAME:-store}
      DATABASE_USERNAME: ${DB_USER:-store}
      DATABASE_PASSWORD: ${DB_PASSWORD:-devpass}
    deploy:
      replicas: 1
    depends_on:
      - db

  product:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    hostname: product
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: ${DB_NAME:-store}
      DATABASE_USERNAME: ${DB_USER:-store}
      DATABASE_PASSWORD: ${DB_PASSWORD:-devpass}
    deploy:
      replicas: 1
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    hostname: redis

  exchange:
    build:
      context: ./exchange-service
      dockerfile: Dockerfile
    hostname: exchange
    environment:
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: "60"
    deploy:
      replicas: 1
    depends_on:
      - redis

  order:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    hostname: order
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-store}
      DB_USER: ${DB_USER:-store}
      DB_PASSWORD: ${DB_PASSWORD:-devpass}
      PRODUCT_URL: ${PRODUCT_URL:-http://product:8080}
      EXCHANGE_URL: ${EXCHANGE_URL:-http://exchange:8080}
    deploy:
      replicas: 1
    depends_on:
      - db
      - product
      - exchange

  auth:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    hostname: auth
    deploy:
      replicas: 1
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jYCiN0YPiaBP53bGJi/kjfw79HW7xnBu9UPoD/QFFAE=}
      JWT_HTTP_ONLY: ${JWT_HTTP_ONLY:-true}
    depends_on:
      - account

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    hostname: gateway
    environment:
      CORS_ALLOWED_CREDENTIALS: ${CORS_ALLOWED_CREDENTIALS:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    deploy:
      replicas: 3

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    ports:
      - 9090:9090
    volumes:
      - ${SETUP}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ${SETUP}/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

  loadbalancer:
    image: nginx:latest
    hostname: loadbalancer
    ports:
      - 80:80
    volumes:
      - ${SETUP}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway
