scrape_configs:

  - job_name: 'GatewayMetrics'
    metrics_path: '/gateway/actuator/prometheus'
    scrape_interval: 1s
    static_configs:
      - targets:
        - gateway:8080
        labels:
          application: 'Gateway Application'

  - job_name: 'ProductMetrics'
    metrics_path: '/product/actuator/prometheus'
    scrape_interval: 1s
    static_configs:
      - targets:
        - product:8080
        labels:
          application: 'Product Application'